name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: Cards
            asset: cards-linux-x86_64
            cross: false

          - name: Linux ARM64
            runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: Cards
            asset: cards-linux-arm64
            cross: true

          - name: Windows x86_64
            runner: ubuntu-latest
            target: x86_64-pc-windows-gnu
            artifact: Cards.exe
            asset: cards-windows-x86_64.exe
            cross: false

          - name: macOS x86_64
            runner: macos-14
            target: x86_64-apple-darwin
            artifact: cards
            asset: cards-macos-x86_64
            cross: false

          - name: macOS ARM64
            runner: macos-14
            target: aarch64-apple-darwin
            artifact: cards
            asset: cards-macos-arm64
            cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Install mingw (Windows target)
        if: matrix.target == 'x86_64-pc-windows-gnu'
        run: sudo apt-get install -y gcc-mingw-w64-x86-64

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Build (cargo)
        if: ${{ !matrix.cross }}
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact }}
          if-no-files-found: error

  appimage:
    name: Package AppImage (Linux x86_64)
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download Linux x86_64 binary
        uses: actions/download-artifact@v4
        with:
          name: cards-linux-x86_64
          path: appimage-bin/

      - name: Install appimagetool
        run: |
          wget -q "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage" \
            -O /usr/local/bin/appimagetool
          chmod +x /usr/local/bin/appimagetool

      - name: Assemble AppDir
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/16x16/apps
          mkdir -p AppDir/usr/share/icons/hicolor/32x32/apps
          mkdir -p AppDir/usr/share/icons/hicolor/48x48/apps
          mkdir -p AppDir/usr/share/icons/hicolor/64x64/apps
          mkdir -p AppDir/usr/share/icons/hicolor/128x128/apps
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          mkdir -p AppDir/usr/share/icons/hicolor/scalable/apps

          # Binary
          cp appimage-bin/Cards AppDir/usr/bin/Cards
          chmod +x AppDir/usr/bin/Cards

          # Desktop file (AppImage spec requires it at root too)
          cp assets/cards.desktop AppDir/cards.desktop
          cp assets/cards.desktop AppDir/usr/share/applications/cards.desktop

          # Icons
          cp assets/icon_16.png  AppDir/usr/share/icons/hicolor/16x16/apps/cards.png
          cp assets/icon_32.png  AppDir/usr/share/icons/hicolor/32x32/apps/cards.png
          cp assets/icon_48.png  AppDir/usr/share/icons/hicolor/48x48/apps/cards.png
          cp assets/icon_64.png  AppDir/usr/share/icons/hicolor/64x64/apps/cards.png
          cp assets/icon_128.png AppDir/usr/share/icons/hicolor/128x128/apps/cards.png
          cp assets/icon_256.png AppDir/usr/share/icons/hicolor/256x256/apps/cards.png
          cp assets/app.svg      AppDir/usr/share/icons/hicolor/scalable/apps/cards.svg

          # AppImage spec: icon + .DirIcon at root
          cp assets/icon_256.png AppDir/cards.png
          cp assets/icon_256.png AppDir/.DirIcon

          # AppRun entry-point
          cat > AppDir/AppRun << 'EOF'
          #!/bin/sh
          exec "$APPDIR/usr/bin/Cards" "$@"
          EOF
          chmod +x AppDir/AppRun

      - name: Build AppImage
        run: |
          ARCH=x86_64 appimagetool AppDir Cards-x86_64.AppImage

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: cards-linux-x86_64.AppImage
          path: Cards-x86_64.AppImage
          if-no-files-found: error

  release:
    name: Create Release
    needs: [build, appimage]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Flatten dist folder
        run: |
          for dir in dist/*/; do
            asset=$(basename "$dir")
            # If the inner file already has an extension that differs from the
            # artifact directory name, keep the original filename (e.g. .AppImage).
            inner=$(ls "$dir")
            ext="${inner##*.}"
            if [ "$inner" = "Cards-x86_64.AppImage" ]; then
              mv "$dir$inner" "dist/$inner"
            else
              mv "$dir$inner" "dist/$asset-bin"
              mv "dist/$asset-bin" "dist/$asset"
            fi
            rmdir "$dir" 2>/dev/null || true
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: dist/*
